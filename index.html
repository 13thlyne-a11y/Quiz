<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>퀴즈 이벤트</title>

<style>
body{
    margin:0;
    font-family: 'Pretendard', sans-serif;
    color:white;
    overflow-x:hidden;
    background: radial-gradient(ellipse at bottom, #0b1d3a 0%, #000000 100%);
}

/* ⭐ 별 애니메이션 */
.stars{
    position:fixed;
    width:100%;
    height:100%;
    background:transparent;
    box-shadow:
    100px 200px white,
    300px 400px white,
    500px 100px white,
    700px 300px white,
    900px 150px white,
    1200px 250px white,
    1500px 350px white,
    200px 600px white,
    600px 700px white,
    1000px 500px white,
    1400px 650px white;
    animation: twinkle 3s infinite alternate;
    z-index:-1;
}

@keyframes twinkle{
    from{opacity:0.3;}
    to{opacity:1;}
}

h1{
    text-align:center;
    padding-top:20px;
}

.quiz-container{
    max-width:900px;
    margin:40px auto;
}

.card{
    background:rgba(255,255,255,0.08);
    padding:20px;
    margin-bottom:20px;
    border-radius:12px;
    backdrop-filter: blur(6px);
}

.question{
    font-weight:bold;
    margin-bottom:15px;
}

.options label{
    display:block;
    padding:8px 0;
    cursor:pointer;
}

button{
    display:block;
    margin:30px auto;
    padding:12px 50px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}

#result{
    text-align:center;
    font-size:28px;
    font-weight:bold;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="stars"></div>

<h1>🌌 2026년 정월대보름 및 개기월식 행사<br>
             온라인 퀴즈 이벤트</h1>

<div class="quiz-container" id="quiz"></div>

<button id="submitBtn">제출</button>
<div id="result"></div>
<button id="retryBtn" style="display:none;">다시 풀기</button>

<script>

const quizData = [
{q:"정월대보름과 개기월식의 행사의 주인공으로 오늘 볼 수 있는 달의 형태는 무엇일까요?",options:["초승달","그믐달","반달","보름달"],answer:4},
{q:"황도 12궁 중 2/20~3/20 별자리는 무엇일까요?",options:["염소자리","물병자리","궁수자리","물고기자리"],answer:4},
{q:"포물면 전파망원경을 제작한 사람은 누구일까요?",options:["한스 리퍼세이","윌리엄 파슨스","그로트 레버","칼 구스 잰스키"],answer:3},
{q:"우주에서 사용하는 거리 단위 중 연주시차 1초에 해당하는 거리로, 우리은하 바깥에 있는 천체까지의 거리를 나타낼 때 사용하는 단위는 무엇일까요?",options:["천문단위","광년","파섹","옹스트롬"],answer:3},
{q:"우리나라의 대표적인 세시풍속 중 하나인 정월대보름의 날짜는 언제일까요?",options:["매년 음력 1월 1일","매년 음력 1월 15일","매년 음력 3월 3일","매년 음력 4월 1일"],answer:2},
{q:"대물렌즈와 접안렌즈가 모두 볼록렌즈인 망원경의 형식은 무엇일까요?",options:["갈릴레오식","뉴턴식","케플식","카세그레인식"],answer:3},
{q:"우리은하의 나선팔 중에서 태양계가 위치한 나선팔은 무엇일까요?",options:["궁수자리 팔","오리온자리 팔","처녀자리 팔","천칭자리 팔"],answer:2},
{q:"달처럼 위상이 변하는 행성은 무엇일까요?",options:["수성","목성","화성","천왕성"],answer:1},
{q:"개기월식은 달이 지구의 그림자에 완전히 가려져 평소와 다르게 보이는 현상입니다. 개기월식 때 보이는 달의 색깔은 무엇일까요?",options:["노란색","푸른색","붉은색","검은색"],answer:3},
{q:"기원전 3천년 바빌로니아에 건축된 계단식 탑 형태의 구조물로 신전의 기능과 천문관측대로서의 기능을 가진 것은 무엇일까요?",options:["아부심벨","스톤헨지","피라미드","지구라트"],answer:4},
{q:"마젤란 성운의 변광성을 관측하던 중 세페이드 변광성의 '주기-광도 관계'를 발견한 사람은 누구일까요?",options:["헨리에타 스완 레빗","프리드리히 베셀","갈릴레오 갈릴레이","알 수피"],answer:1},
{q:"1576년 덴마크 벤섬에 티코 브라헤가 세운 천문대는 무엇일까요?",options:["마라게","우라니보르크","그리니치","잔타르만타르"],answer:2},
{q:"대전시민천문대 1층 복도에 전시되어 있는 천체사진이 아닌 것은 무엇일까요?",options:["맥노트혜성","페르세우스 이중성단","코페르니쿠스 충돌구","안드로메다은하"],answer:1},
{q:"조선 세종 때 만들어진 간의는 1년의 길이를 소수점 이하 ㅇ자리까지 정확하게 측정할 수 있었습니다. ㅇ에 들어갈 숫자는 얼마일까요?",options:["1","3","5","7"],answer:3},
{q:"조선시대의 인물로 무한우주론을 주장하고 의산문답을 저술한 사람은 누구일까요?",options:["이순지","장영실","정약용","홍대용"],answer:4},
{q:"조선시대에는 현재의 기상청과 천문대의 기능을 하던 기관인 관상감이 있었습니다. 관상감이 연산군 때 바뀌었던 이름은 무엇일까요?",options:["사력서","관상국","서운관","측후소"],answer:1},
{q:"대전시민천문대 앞마당에 있는 우주인 모형의 개수는 몇개일까요?",options:["1개","2개","3개","4개"],answer:2},
{q:"1604년 선조실록에 객성으로 기록되었으며 우주 팽창을 연구할 때 활용하는 천체는 무엇일까요?",options:["삼태성","북극성","초신성","노인성"],answer:3},
{q:"2003년에 발사된 구경 50cm의 자외선 우주망원경으로 우리나라가 주도적으로 참여한 첫 번째 우주관측위성은 무엇일까요?",options:["갤렉스","허블","찬드라","제임스웹"],answer:1},
{q:"미국 뉴멕시코에 위치한 지름 25m의 안테나 27개로 구성되어 있는 전파망원경은 무엇일까요?",options:["KVN","ALMA","VLA","아레시보전파천문대"],answer:3}
]

const quizContainer=document.getElementById("quiz")
const submitBtn=document.getElementById("submitBtn")
const resultDiv=document.getElementById("result")
const retryBtn=document.getElementById("retryBtn")

function loadQuiz(){
quizContainer.innerHTML=""
quizData.forEach((item,index)=>{
const card=document.createElement("div")
card.classList.add("card")

let optionsHTML=""
item.options.forEach((opt,i)=>{
optionsHTML+=`
<label>
<input type="radio" name="q${index}" value="${i}">
${opt}
</label>`
})

card.innerHTML=`
<div class="question">${index+1}. ${item.q}</div>
<div class="options">${optionsHTML}</div>
`
quizContainer.appendChild(card)
})
}

submitBtn.onclick=function(){
let score=0
const cards=document.querySelectorAll(".card")

cards.forEach((card,index)=>{
const selected=card.querySelector("input:checked")
if(selected && Number(selected.value)===quizData[index].answer - 1){
score+=5
}
})

resultDiv.textContent="점수 : "+score+" / 100"
retryBtn.style.display="block"
window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"})
}

retryBtn.onclick=function(){
resultDiv.textContent=""
retryBtn.style.display="none"
loadQuiz()
window.scrollTo({top:0,behavior:"smooth"})
}

loadQuiz()

</script>

</body>
</html>
